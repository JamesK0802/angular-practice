<div class="container py-4">
  <div class="row gy-4">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0">Batch Master</h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">Batch Name</th>
                  <th scope="col">Created Date</th>
                  <th scope="col" class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                @for (item of batchList; track $index) {
                  <tr>
                    <th scope="row">{{$index+1}}</th>
                    <td>{{ item.batchName }}</td>
                    <td>{{ item.createdDate}}</td>
                    <td class="text-end">
                      <button type="button" class="btn btn-sm btn-outline-primary me-2">Edit</button>
                      <button type="button" class="btn btn-sm btn-outline-danger">Delete</button>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0">Add Batch</h5>
        </div>
        <div class="card-body">
          <form class="row g-3">

            <div class="col-12">
              <label class="form-label">Batch Name</label>
              <input type="text" name="batchName" [(ngModel)]="newBatchObj.batchName" class="form-control" placeholder="Enter batch name" />
            </div>

            <div class="col-12">
              <label class="form-label">Created Date</label>
              <input type="date" name="createdDate" [(ngModel)]="newBatchObj.createdDate" class="form-control" />
            </div>

            <div class="col-12 d-flex gap-2">
              <button type="button" class="btn btn-primary flex-fill" (click)="onSaveBatch()">Save</button>
              <button type="reset" class="btn btn-outline-secondary flex-fill">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
